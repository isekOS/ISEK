name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Install JavaScript dependencies
      run: |
        cd isek/protocol/p2p
        npm install

    - name: Build package
      run: python -m build

    - name: Publish to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        python -m twine upload dist/*

    - name: Create setup scripts
      run: |
        # Unix install script
        cat > setup_isek.sh << 'EOF'
        #!/bin/bash
        echo "🚀 Setting up ISEK..."
        if ! command -v python3 &> /dev/null; then
            echo "❌ Python 3 is required."
            exit 1
        fi
        if ! command -v node &> /dev/null; then
            echo "⚠️ Node.js is required for P2P functionality"
        fi
        pip install isek
        isek setup
        echo "✅ ISEK setup completed!"
        EOF
        chmod +x setup_isek.sh

        # Windows install script
        cat > setup_isek.bat << 'EOF'
        @echo off
        echo 🚀 Setting up ISEK...
        python --version >nul 2>&1 || (
            echo ❌ Python is required.
            pause
            exit /b 1
        )
        node --version >nul 2>&1 || (
            echo ⚠️ Node.js is required for P2P functionality
        )
        pip install isek
        isek setup
        echo ✅ ISEK setup completed!
        pause
        EOF

    - name: Upload setup scripts to GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          setup_isek.sh
          setup_isek.bat
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
